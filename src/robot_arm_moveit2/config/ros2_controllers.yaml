# This config file is used by ros2_control
controller_manager:
  ros__parameters:
    update_rate: 100  # Hz

    arm_controller:
      type: joint_trajectory_controller/JointTrajectoryController


    gripper_controller:
      type: joint_trajectory_controller/JointTrajectoryController


    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

arm_controller:
  ros__parameters:
    joints:
      - link_1
      - link_2
      - link_3
      - link_4
      - link_5
    command_interfaces:
      - position
    state_interfaces:
      - position
      
    allow_nonzero_velocity_at_trajectory_end: true
gripper_controller:
  ros__parameters:
    joints:
      - link_6
    command_interfaces:
      - position
    state_interfaces:
      - position
      
    allow_nonzero_velocity_at_trajectory_end: true